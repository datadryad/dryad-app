name: RSpec Internal Tests

on: pull_request

jobs:
  rspec-internal:
    name: RSpec Internal Tests
    runs-on: ubuntu-22.04

    services:
      solr:
        image: solr:9.7.0
        ports:
          - 8983:8983

    env:
      DB_ADAPTER: mysql2
      MYSQL_PWD: root
      RAILS_ENV: test
      SOLR_URL: http://localhost:8983/solr/dryad
      ROR_SOLR_URL: http://localhost:8983/solr/rors

    steps:
    - name: 'Checkout the repo'
      uses: actions/checkout@v5
      with:
        fetch-depth: 1

    - name: 'Set Ruby and Bundler Versions'
      run: |
        echo "RUBY_VERSION=3.3.7" >> $GITHUB_ENV
        echo "BUNDLER_VERSION=`cat ./Gemfile.lock | grep -A 1 'BUNDLED WITH' | grep -oE '[0-9]\.[0-9]'`" >> $GITHUB_ENV

    - name: 'Install Ruby and gems'
      uses: ruby/setup-ruby@v1
      with:
        ruby-version: ${{ env.RUBY_VERSION }}
        bundler-cache: true

    - name: 'setup node for node-sass'
      uses: actions/setup-node@v5
      with:
        node-version: 24

    - name: 'Install MySQL Packages'
      run: |
        sudo apt-get update
        sudo apt-get install -y mysql-client libmysqlclient-dev

    - name: 'Start MySQL'
      run: sudo systemctl start mysql

    - name: 'Setup Test DB'
      run: |
        mysql -u root -e 'CREATE DATABASE IF NOT EXISTS dashv2_test' 
        mysql -u root -e 'CREATE USER IF NOT EXISTS travis@localhost'
        mysql -u root -e 'GRANT ALL ON dashv2_test.* TO travis@localhost'
        mysql -u root -e 'set global log_bin_trust_function_creators=1'
        bin/rails db:migrate:reset RAILS_ENV=test

    - name: 'Setup Solr'
      run: |
        docker exec --user solr "${{ job.services.solr.id }}" bin/solr create_core -c dryad
        docker exec --user solr "${{ job.services.solr.id }}" bin/solr create_core -c rors

        docker cp config/solr_config/resources/protwords.txt "${{ job.services.solr.id }}:/var/solr/data/dryad/conf/"
        docker cp config/solr_config/resources/README.md "${{ job.services.solr.id }}:/var/solr/data/dryad/conf/"
        docker cp config/solr_config/resources/schema.xml "${{ job.services.solr.id }}:/var/solr/data/dryad/conf/"
        docker cp config/solr_config/resources/solrconfig.xml "${{ job.services.solr.id }}:/var/solr/data/dryad/conf/"
        docker cp config/solr_config/resources/stopwords_en.txt "${{ job.services.solr.id }}:/var/solr/data/dryad/conf/"
        docker cp config/solr_config/resources/synonyms.txt "${{ job.services.solr.id }}:/var/solr/data/dryad/conf/"

        docker cp config/solr_config/rors/protwords.txt "${{ job.services.solr.id }}:/var/solr/data/rors/conf/"
        docker cp config/solr_config/rors/README.md "${{ job.services.solr.id }}:/var/solr/data/rors/conf/"
        docker cp config/solr_config/rors/schema.xml "${{ job.services.solr.id }}:/var/solr/data/rors/conf/"
        docker cp config/solr_config/rors/solrconfig.xml "${{ job.services.solr.id }}:/var/solr/data/rors/conf/"
        docker cp config/solr_config/rors/stopwords_en.txt "${{ job.services.solr.id }}:/var/solr/data/rors/conf/"
        docker cp config/solr_config/rors/synonyms.txt "${{ job.services.solr.id }}:/var/solr/data/rors/conf/"

        docker restart "${{ job.services.solr.id }}"

        until curl --fail http://localhost:8983/solr/admin/cores?action=STATUS; do
          sleep 2
        done

    - name: 'RSpec Job Tests'
      run: bin/bundle exec rspec --force-color --format RSpec::Github::Formatter --format progress --tag ~skip spec/jobs

    - name: 'RSpec Model Tests'
      run: bin/bundle exec rspec --force-color --format RSpec::Github::Formatter --format progress --tag ~skip spec/models

    - name: 'RSpec Service Tests'
      run: bin/bundle exec rspec --force-color --format RSpec::Github::Formatter --format progress --tag ~skip spec/services

    - name: 'RSpec Helper Tests'
      run: bin/bundle exec rspec --force-color --format RSpec::Github::Formatter --format progress --tag ~skip spec/helpers

    - name: 'RSpec Library Tests'
      run: bin/bundle exec rspec --force-color --format RSpec::Github::Formatter --format progress --tag ~skip spec/lib

    - name: 'RSpec Task Tests'
      run: bin/bundle exec rspec --force-color --format RSpec::Github::Formatter --format progress --tag ~skip spec/tasks
